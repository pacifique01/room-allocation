<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Room Allocation</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
<main class="login-shell">
    <section class="login-panel">
        <p class="eyebrow">Secure Access</p>
        <h1>Room Allocation</h1>
        <p class="login-copy">Sign in to manage rooms, bookings, and allocation schedules.</p>

        <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post" class="stack-form">
            <label>
                Email
                <input type="email" name="username" placeholder="you@example.com" required autofocus>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Enter password" required>
            </label>
            <button type="submit" class="primary-button">Sign In</button>
        </form>

        <div class="demo-users">
            <span>Admin: admin@roomallocation.local / admin123</span>
            <a th:href="@{/register}">Create lecturer or representative account</a>
        </div>
    </section>
</main>
</body>
</html>
